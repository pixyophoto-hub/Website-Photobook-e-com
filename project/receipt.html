<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Resit Pesanan · PixyoPrint</title>
<link rel="icon" href="favicon-p.png?v=3" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hanken Grotesk',sans-serif;color:#423b36;background:#faf6ef;min-height:100vh;padding:28px 16px;}
.wrap{max-width:560px;margin:0 auto;}
.logo{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;text-align:center;margin-bottom:20px;color:#423b36;}
.logo span{color:#a86d69;}
.card{background:#fffdfa;border:1px solid #efe6da;border-radius:16px;padding:28px 26px;box-shadow:0 4px 20px rgba(45,37,32,.05);}
.top{text-align:center;border-bottom:2px solid #2d2520;padding-bottom:18px;margin-bottom:20px;}
.top h1{font-family:'Cormorant Garamond',serif;font-size:22px;letter-spacing:2px;color:#a86d69;}
.top .ref{font-size:14px;font-weight:700;margin-top:6px;}
.top .date{font-size:12px;color:#8a7e72;margin-top:2px;}
.row{display:flex;justify-content:space-between;gap:10px;margin-bottom:14px;}
.label{font-size:10px;letter-spacing:1px;color:#a86d69;font-weight:700;text-transform:uppercase;margin-bottom:4px;}
.val{font-size:14px;line-height:1.5;}
.items{margin:18px 0;}
.item{display:flex;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid #f0ebe4;font-size:13px;}
.item .n{color:#2d2520;font-weight:600;}
.item .p{color:#6f6358;font-weight:600;white-space:nowrap;}
.tot{margin-top:16px;}
.tot .r{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;color:#6f6358;}
.tot .grand{display:flex;justify-content:space-between;border-top:2px solid #2d2520;margin-top:8px;padding-top:12px;font-size:18px;font-weight:800;color:#a86d69;}
.status-pill{display:inline-block;padding:5px 14px;border-radius:100px;font-size:12px;font-weight:700;margin-top:14px;}
.note{margin-top:24px;font-size:11px;color:#9a8d80;line-height:1.7;text-align:center;border-top:1px solid #f0ebe4;padding-top:14px;}
.err{text-align:center;padding:60px 20px;color:#8a7e72;font-size:14px;}
.btn-print{display:block;width:100%;margin-top:18px;padding:12px;background:#2d2520;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
@media print{.btn-print{display:none;}body{background:#fff;padding:0;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">Pixyo<span>Print</span></div>
  <div class="card" id="receipt-card">
    <div class="err" id="loading">Memuatkan resit...</div>
  </div>
</div>
<script>
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
const STATUS_LABEL = {
  pending:'Menunggu Bayaran', completed:'Selesai Bayaran',
  'Hantar Gambar':'Hantar Gambar', Reviewing:'Reviewing', Editing:'Editing',
  Amend:'Amend', Printing:'Printing', Delivery:'Delivery', Siap:'Siap'
};
const params = new URLSearchParams(location.search);
const ref = params.get('ref') || '';
const token = params.get('token') || '';
fetch('/api/receipt?ref=' + encodeURIComponent(ref) + '&token=' + encodeURIComponent(token))
  .then(r => r.json())
  .then(d => {
    const card = document.getElementById('receipt-card');
    if(!d.ok){
      card.innerHTML = '<div class="err"><i class="ph ph-receipt" style="font-size:32px;display:block;margin-bottom:10px;"></i>Resit tidak ditemui atau pautan tidak sah.</div>';
      return;
    }
    let sub = 0;
    const rows = (d.items||[]).map(i=>{
      const qty = Number(i.qty)||1;
      const line = parseFloat((i.price*qty)||i.price||0);
      sub += line;
      return `<div class="item"><span class="n">${esc(i.name)}${qty>1?' ×'+qty:''}</span><span class="p">RM ${line.toFixed(2)}</span></div>`;
    }).join('') || '<div class="item"><span class="n">— tiada item —</span></div>';
    const postage = parseFloat(d.postage)||0;
    const discount = parseFloat(d.discount)||0;
    const total = parseFloat(d.total)||(sub+postage-discount);
    const statusLabel = STATUS_LABEL[d.status] || d.status || '—';
    const isPaid = d.status !== 'pending';
    card.innerHTML = `
      <div class="top">
        <h1>RESIT PESANAN</h1>
        <div class="ref">#${esc(d.reference)}</div>
        <div class="date">${esc(d.date||'')}</div>
      </div>
      <div class="row">
        <div><div class="label">Pelanggan</div><div class="val">${esc(d.name||'—')}</div></div>
      </div>
      <div class="items">${rows}</div>
      <div class="tot">
        <div class="r"><span>Subtotal</span><span>RM ${sub.toFixed(2)}</span></div>
        ${discount>0?`<div class="r"><span>Diskaun</span><span>-RM ${discount.toFixed(2)}</span></div>`:''}
        <div class="r"><span>Postage</span><span>${postage>0?'RM '+postage.toFixed(2):'Percuma'}</span></div>
        <div class="grand"><span>JUMLAH</span><span>RM ${total.toFixed(2)}</span></div>
      </div>
      <div style="text-align:center;">
        <span class="status-pill" style="background:${isPaid?'#dde6d8':'#fdeecf'};color:${isPaid?'#4a5e3a':'#b7860a'};">${esc(statusLabel)}</span>
      </div>
      <button class="btn-print" onclick="window.print()"><i class="ph ph-printer"></i> Cetak / Muat Turun</button>
      <div class="note">Terima kasih kerana membuat tempahan dengan PixyoPrint.<br>Sebarang pertanyaan: WhatsApp 019-957 2015 &middot; pixyoprint.com</div>
    `;
  })
  .catch(() => {
    document.getElementById('receipt-card').innerHTML = '<div class="err">Gagal memuatkan resit. Sila cuba lagi.</div>';
  });
</script>
</body>
</html>
