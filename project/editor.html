<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PixyoPrint · Portal Editor</title>
<link rel="icon" href="favicon-p.png?v=3" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f2ede6;font-family:'Hanken Grotesk',sans-serif;color:#2d2520;}
select,input{font-family:'Hanken Grotesk',sans-serif;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:60px;background:#2d2520;color:#f5ede4;}
.wrap{max-width:860px;margin:0 auto;padding:28px 20px 60px;}
.card{background:#fffdfa;border-radius:12px;border:1px solid #ede4d8;padding:20px 22px;margin-bottom:16px;}
.inp{border:1px solid #e3d8cb;border-radius:7px;padding:9px 13px;font-size:13px;color:#473f38;background:#fffdfa;outline:none;}
.inp:focus{border-color:#c98a86;}
.btn{border:none;background:#c98a86;color:#fff;font-family:inherit;font-weight:600;cursor:pointer;border-radius:8px;transition:background .15s;}
.btn:hover{background:#b9786f;}
.pill{font-size:11px;font-weight:600;padding:4px 10px;border-radius:100px;display:inline-block;}
.tag{font-size:10px;color:#6f6358;background:#f0e8df;padding:2px 8px;border-radius:100px;}
.toast{position:fixed;bottom:28px;right:28px;background:#2d2520;color:#fff;font-size:13px;font-weight:600;padding:13px 20px;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.18);z-index:999;opacity:0;transform:translateY(12px);transition:all .25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.ed-nav{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:8px;color:#cdbfb2;font-size:14px;font-weight:600;text-decoration:none;cursor:pointer;margin-bottom:4px;}
.ed-nav:hover{background:#3a312a;color:#fff;}
.ed-nav.active{background:#463b32;color:#fff;}
.ed-stat{background:#fffdfa;border:1px solid #ede4d8;border-radius:12px;padding:20px 22px;}
.ed-stat .lbl{font-size:11px;letter-spacing:.06em;color:#9a8d80;font-weight:700;text-transform:uppercase;}
.ed-stat .num{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:600;color:#2d2520;margin-top:10px;}
@media(max-width:720px){.ed-sidebar{width:64px!important;}.ed-sidebar .ed-label{display:none;}.ed-stat-grid{grid-template-columns:1fr!important;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-overlay" style="display:none;position:fixed;inset:0;z-index:1000;background:linear-gradient(135deg,#2d2520,#3d2f27);align-items:center;justify-content:center;">
  <div style="width:360px;max-width:92vw;background:#fffdfa;border-radius:14px;padding:34px 30px;box-shadow:0 20px 60px rgba(0,0,0,.35);">
    <div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;">Portal Editor</div>
    <div style="font-size:11px;font-family:'Courier New',monospace;letter-spacing:0.18em;text-transform:uppercase;color:#a89a8d;margin-top:6px;margin-bottom:24px;">PixyoPrint · Log Masuk</div>
    <form onsubmit="doLogin(event)">
      <div style="font-size:12px;font-weight:600;color:#6f6358;margin-bottom:6px;">Email</div>
      <input type="email" id="login-email" class="inp" style="width:100%;margin-bottom:14px;" placeholder="email@pixyoprint.com" required>
      <div style="font-size:12px;font-weight:600;color:#6f6358;margin-bottom:6px;">Kata Laluan</div>
      <input type="password" id="login-pass" class="inp" style="width:100%;" placeholder="••••••••" required>
      <div id="login-error" style="display:none;font-size:12px;color:#c0392b;background:#fef3f2;border-radius:7px;padding:9px 12px;margin:10px 0 0;"></div>
      <button type="submit" class="btn" style="width:100%;font-size:14px;padding:13px;margin-top:16px;">Log Masuk</button>
    </form>
  </div>
</div>

<!-- PORTAL -->
<div id="portal" style="display:none;">
  <div style="display:flex;min-height:100vh;">
    <!-- Sidebar -->
    <aside class="ed-sidebar" style="width:222px;flex:none;background:#2d2520;color:#cdbfb2;display:flex;flex-direction:column;padding:22px 0;">
      <div style="padding:0 20px 22px;">
        <div style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:#fff;">Pixyo<span style="color:#c98a86;">Print</span></div>
        <div class="ed-label" style="font-size:10px;letter-spacing:.2em;color:#8a7c6d;margin-top:2px;">PORTAL EDITOR</div>
      </div>
      <nav style="flex:1;padding:0 12px;">
        <a id="nav-overview" class="ed-nav active" onclick="showEditorView('overview')"><i class="ph ph-squares-four" style="font-size:18px;"></i><span class="ed-label">Overview</span></a>
        <a id="nav-orders" class="ed-nav" onclick="showEditorView('orders')"><i class="ph ph-list-checks" style="font-size:18px;"></i><span class="ed-label">Senarai Order</span></a>
      </nav>
      <div style="padding:16px 18px 0;margin:0 6px;border-top:1px solid #40372f;display:flex;align-items:center;gap:10px;">
        <div id="ed-avatar" style="width:34px;height:34px;flex:none;border-radius:50%;background:#c98a86;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;">E</div>
        <div class="ed-label" style="flex:1;min-width:0;">
          <div id="ed-name" style="font-size:13px;color:#f5ede4;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
          <div style="font-size:11px;color:#8a7c6d;">Editor</div>
        </div>
        <i class="ph ph-sign-out" style="font-size:16px;cursor:pointer;color:#9a8d80;" title="Log keluar" onclick="logout()"></i>
      </div>
    </aside>
    <!-- Content -->
    <main style="flex:1;min-width:0;background:#f2ede6;">
      <div style="padding:28px 32px;max-width:1000px;">
        <!-- OVERVIEW -->
        <div id="view-overview">
          <div style="font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;">Selamat datang, <span id="ov-name"></span></div>
          <div style="font-size:13px;color:#8a7e72;margin-bottom:26px;"><span id="ov-date"></span> · Ringkasan kerja anda</div>
          <div class="ed-stat-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;">
            <div class="ed-stat"><div class="lbl"><i class="ph ph-clipboard-text" style="color:#a86d69;"></i> Order Saya</div><div class="num" id="ov-total">0</div></div>
            <div class="ed-stat"><div class="lbl"><i class="ph ph-spinner-gap" style="color:#4a7fb5;"></i> Dalam Proses</div><div class="num" id="ov-proses">0</div></div>
            <div class="ed-stat"><div class="lbl"><i class="ph ph-check-circle" style="color:#6f8466;"></i> Siap</div><div class="num" id="ov-siap">0</div></div>
          </div>
          <div style="margin-top:26px;">
            <div style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;margin-bottom:12px;">Perlu Tindakan</div>
            <div id="ov-action"></div>
          </div>
        </div>
        <!-- SENARAI ORDER -->
        <div id="view-orders" style="display:none;">
          <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px;">
            <div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;">Order Ditugaskan Kepada Saya</div>
            <span id="order-count" style="font-size:13px;color:#8a7e72;"></span>
          </div>
          <div id="order-list"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WORKFLOW = ['Hantar Gambar','Order','Editing','Reviewing','Amend','Printing','Delivery','Siap'];
let PACKAGES = [];
const STATUS_COLOR = {
  'Menunggu Bayaran':{bg:'#fdecea',color:'#c0392b'},
  'Hantar Gambar':{bg:'#fef3f2',color:'#c0392b'},
  'Order':{bg:'#fef9ec',color:'#b7860a'},
  'Editing':{bg:'#eef4fb',color:'#2471a3'},
  'Reviewing':{bg:'#f0eafb',color:'#7d3c98'},
  'Amend':{bg:'#fdf2e4',color:'#ca6f1e'},
  'Printing':{bg:'#eafaf1',color:'#1e8449'},
  'Delivery':{bg:'#dde6d8',color:'#4a5e3a'},
  'Siap':{bg:'#dde6d8',color:'#4a5e3a'}
};

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function authHeaders(){ const t = sessionStorage.getItem('pixyo_token'); return t ? { 'Authorization':'Bearer '+t } : {}; }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
function showLogin(){ document.getElementById('login-overlay').style.display='flex'; document.getElementById('portal').style.display='none'; }
function showPortal(){ document.getElementById('login-overlay').style.display='none'; document.getElementById('portal').style.display='block'; }

function statusPill(s){
  const c = STATUS_COLOR[s] || {bg:'#f0e8df',color:'#6f6358'};
  return `<span class="pill" style="background:${c.bg};color:${c.color};">${esc(s)}</span>`;
}

function mapStatus(s){
  if(s === 'completed') return 'Hantar Gambar';
  if(s === 'pending')   return 'Menunggu Bayaran';
  return s;
}

function doLogin(ev){
  ev.preventDefault();
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const err   = document.getElementById('login-error');
  err.style.display='none';
  fetch('/api/login',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email, password:pass}) })
    .then(r=>r.json())
    .then(res=>{
      if(res.ok){
        if(res.role !== 'editor'){
          err.textContent = 'Akaun ini bukan akaun editor. Guna admin.html untuk admin.';
          err.style.display='block';
          return;
        }
        sessionStorage.setItem('pixyo_token', res.token);
        sessionStorage.setItem('pixyo_name', res.name);
        initPortal();
      } else {
        err.textContent = res.error || 'Log masuk gagal';
        err.style.display='block';
      }
    })
    .catch(()=>{ err.textContent='Gagal sambung ke server'; err.style.display='block'; });
}

function logout(){
  fetch('/api/logout',{ method:'POST', headers:authHeaders() }).catch(()=>{});
  sessionStorage.removeItem('pixyo_token');
  sessionStorage.removeItem('pixyo_name');
  showLogin();
}

function showEditorView(view){
  document.getElementById('view-overview').style.display = view==='overview' ? 'block' : 'none';
  document.getElementById('view-orders').style.display   = view==='orders'   ? 'block' : 'none';
  document.getElementById('nav-overview').classList.toggle('active', view==='overview');
  document.getElementById('nav-orders').classList.toggle('active', view==='orders');
}

function initPortal(){
  showPortal();
  const name = sessionStorage.getItem('pixyo_name') || '';
  document.getElementById('ed-name').textContent = name;
  document.getElementById('ov-name').textContent = name.split(' ')[0] || name;
  document.getElementById('ed-avatar').textContent =
    name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2) || 'E';
  const hari = ['Ahad','Isnin','Selasa','Rabu','Khamis','Jumaat','Sabtu'];
  const bulan = ['Jan','Feb','Mac','Apr','Mei','Jun','Jul','Ogos','Sep','Okt','Nov','Dis'];
  const now = new Date();
  document.getElementById('ov-date').textContent =
    hari[now.getDay()]+', '+now.getDate()+' '+bulan[now.getMonth()]+' '+now.getFullYear();
  showEditorView('overview');
  // Muat pakej (untuk fallback spesifikasi order lama), kemudian order
  fetch('/api/packages').then(r=>r.json())
    .then(list=>{ if(Array.isArray(list)) PACKAGES = list; })
    .catch(()=>{})
    .finally(loadMyOrders);
}

function renderOverview(orders){
  const total = orders.length;
  let siap = 0, proses = 0;
  orders.forEach(o=>{
    const s = mapStatus(o.status);
    if(s === 'Siap') siap++;
    else if(o.status !== 'pending') proses++;
  });
  document.getElementById('ov-total').textContent  = total;
  document.getElementById('ov-proses').textContent = proses;
  document.getElementById('ov-siap').textContent   = siap;
  // Perlu tindakan: order dah bayar tapi belum Siap
  const action = orders.filter(o=> o.status !== 'pending' && mapStatus(o.status) !== 'Siap');
  const el = document.getElementById('ov-action');
  if(!action.length){
    el.innerHTML = '<div class="card" style="color:#9a8d80;text-align:center;padding:26px;"><i class="ph ph-check-circle" style="font-size:28px;color:#6f8466;display:block;margin-bottom:8px;"></i>Tiada order menunggu tindakan. Bagus!</div>';
    return;
  }
  el.innerHTML = action.map(o=>`
    <div class="card" style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;cursor:pointer;" onclick="showEditorView('orders')">
      <div>
        <div style="font-size:11px;color:#a86d69;font-weight:700;">#${esc(o.reference)}</div>
        <div style="font-size:14px;font-weight:600;margin-top:2px;">${esc(o.name||'—')}</div>
      </div>
      ${statusPill(mapStatus(o.status))}
    </div>`).join('');
}

function loadMyOrders(){
  fetch('/api/orders', { headers: authHeaders() })
    .then(r=>r.json())
    .then(d=>{
      const list = document.getElementById('order-list');
      const orders = (d.ok && d.orders) ? d.orders : [];
      document.getElementById('order-count').textContent = orders.length + ' order';
      renderOverview(orders);
      if(!orders.length){
        list.innerHTML = `<div class="card" style="text-align:center;padding:40px;color:#9a8d80;">
          <i class="ph ph-tray" style="font-size:34px;color:#cdbfb2;display:block;margin-bottom:10px;"></i>
          Tiada order ditugaskan kepada anda buat masa ini.</div>`;
        return;
      }
      list.innerHTML = orders.map(renderOrderCard).join('');
    })
    .catch(()=>showToast('Gagal muat order'));
}

function renderOrderCard(o){
  const status = mapStatus(o.status);
  const items = (o.items||[]).map(i=>{
    // Order lama tiada snapshot spec — ambil dari pakej semasa ikut nama
    const pk = PACKAGES.find(p=>p.name===i.name) || {};
    const desc     = i.desc     || pk.desc     || '';
    const pages    = i.pages    || pk.pages    || '';
    const material = i.material || pk.material || '';
    const size     = i.size     || pk.size     || '';
    const tags = [pages,material,size].filter(Boolean)
      .map(t=>`<span class="tag">${esc(t)}</span>`).join(' ');
    const qty = Number(i.qty)>1 ? ' ×'+Number(i.qty) : '';
    return `<div style="padding:8px 0;border-top:1px solid #f4efe7;">
      <div style="font-size:13px;font-weight:600;color:#2d2520;">${esc(i.name)}${qty}</div>
      ${desc?`<div style="font-size:11px;color:#9a8d80;margin-top:2px;">${esc(desc)}</div>`:''}
      ${tags?`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;">${tags}</div>`:''}
    </div>`;
  }).join('');

  const waNum = (o.phone||'').replace(/[^0-9]/g,'');
  const waLink = waNum ? `<a href="https://wa.me/${esc(waNum)}" target="_blank" rel="noopener" style="color:#1e8449;text-decoration:none;font-weight:600;"><i class="ph ph-whatsapp-logo"></i> ${esc(o.phone)}</a>` : '<span style="color:#9a8d80;">—</span>';

  const opts = WORKFLOW.map(s=>`<option${s===status?' selected':''}>${esc(s)}</option>`).join('');
  const isPaid = o.status !== 'pending';

  return `<div class="card">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px;">
      <div>
        <div style="font-size:11px;letter-spacing:.08em;color:#a86d69;font-weight:700;">#${esc(o.reference)}</div>
        <div style="font-size:16px;font-weight:700;margin-top:2px;">${esc(o.name||'—')}</div>
        <div style="font-size:12px;color:#9a8d80;margin-top:2px;">${esc(o.email||'')}</div>
      </div>
      <div style="text-align:right;">
        ${statusPill(status)}
        <div style="font-size:11px;color:#9a8d80;margin-top:6px;">${esc(o.created_at||'')}</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px;">
      <div style="background:#faf8f5;border-radius:8px;padding:10px 12px;">
        <div style="font-size:10px;color:#9a8d80;font-weight:600;margin-bottom:3px;">HUBUNGI (WHATSAPP)</div>
        <div style="font-size:13px;">${waLink}</div>
      </div>
      <div style="background:#faf8f5;border-radius:8px;padding:10px 12px;">
        <div style="font-size:10px;color:#9a8d80;font-weight:600;margin-bottom:3px;">CARA HANTAR GAMBAR</div>
        <div style="font-size:13px;font-weight:600;">${esc(o.medium||'—')}</div>
      </div>
    </div>

    ${(o.alamat||o.poskod||o.bandar||o.negeri) ? `
    <div style="background:#faf8f5;border-radius:8px;padding:10px 12px;margin-bottom:6px;">
      <div style="font-size:10px;color:#9a8d80;font-weight:600;margin-bottom:3px;">ALAMAT PENGHANTARAN</div>
      <div style="font-size:13px;color:#473f38;line-height:1.6;">${[esc(o.alamat||''), [esc(o.poskod||''), esc(o.bandar||'')].filter(Boolean).join(' '), esc(o.negeri||'')].filter(function(x){return x && x.trim();}).join('<br>')}</div>
    </div>` : ''}

    <div style="background:#faf8f5;border-radius:8px;padding:6px 12px 12px;margin:10px 0;">
      <div style="font-size:10px;color:#9a8d80;font-weight:600;padding-top:8px;">ITEM TEMPAHAN</div>
      ${items || '<div style="font-size:12px;color:#9a8d80;padding:8px 0;">— tiada item —</div>'}
    </div>

    ${isPaid ? `<div style="background:#faf8f5;border-radius:8px;padding:10px 12px;margin-bottom:10px;" id="ep-box-${esc(o.reference)}">
      <div style="font-size:10px;color:#9a8d80;font-weight:600;margin-bottom:6px;"><i class="ph ph-truck"></i> PENGHANTARAN (EASYPARCEL)</div>
      ${epBoxInner(o)}
    </div>` : ''}

    ${isPaid ? `<div style="display:flex;align-items:center;gap:10px;">
      <span style="font-size:12px;color:#6f6358;font-weight:600;">Kemaskini status:</span>
      <select class="inp" style="flex:1;" onchange="updateStatus('${esc(o.reference)}', this.value)">${opts}</select>
    </div>` : `<div style="font-size:12px;color:#c0392b;background:#fdecea;border-radius:7px;padding:8px 12px;">Menunggu pembayaran pelanggan — belum boleh dikemaskini.</div>`}
  </div>`;
}

// ── EasyParcel (editor boleh book & track order sendiri) ──
function epBookedHtml(ep){
  return '<div style="background:#eef6ef;border:1px solid #cfe6d2;border-radius:8px;padding:10px 12px;font-size:12px;line-height:1.7;">'
    + '<div style="display:flex;justify-content:space-between;"><span style="color:#6f8466;font-weight:700;">'+esc(ep.courier||'Kurier')+'</span><span style="color:#2e7d32;font-weight:700;">Ditempah ✓</span></div>'
    + '<div style="display:flex;justify-content:space-between;"><span style="color:#9a8d80;">No. Tracking</span><b style="font-family:monospace;color:#2471a3;">'+esc(ep.awb||'-')+'</b></div>'
    + '</div>'
    + '<div style="display:flex;gap:8px;margin-top:8px;">'
    + (ep.awb_link?'<a href="'+esc(ep.awb_link)+'" target="_blank" rel="noopener" style="flex:1;text-align:center;text-decoration:none;padding:9px;background:#2d2520;color:#fff;border-radius:8px;font-size:12.5px;font-weight:700;"><i class="ph ph-printer"></i> Print AWB</a>':'')
    + (ep.tracking_url?'<a href="'+esc(ep.tracking_url)+'" target="_blank" rel="noopener" style="flex:1;text-align:center;text-decoration:none;padding:9px;background:#fff;border:1.5px solid #d8c8bc;color:#6f6358;border-radius:8px;font-size:12.5px;font-weight:700;"><i class="ph ph-map-pin"></i> Track</a>':'')
    + '</div>';
}
function epBoxInner(o){
  const ep = o.easyparcel;
  if(ep && ep.awb) return epBookedHtml(ep);
  return '<div style="font-size:12px;color:#9a8d80;margin-bottom:8px;">Belum ditempah. Semak kadar kurier & book untuk jana tracking + AWB.</div>'
    + '<button onclick="epRates(\''+esc(o.reference)+'\', this)" style="width:100%;padding:10px;background:#c98a86;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;"><i class="ph ph-package"></i> Book EasyParcel</button>'
    + '<div class="ep-rates" style="margin-top:8px;"></div>';
}
function epRates(ref, btn){
  const box = document.querySelector('#ep-box-'+ref+' .ep-rates');
  const old = btn.innerHTML; btn.disabled = true; btn.innerHTML = 'Menyemak kadar...';
  fetch('/api/orders/'+encodeURIComponent(ref)+'/ep-rates', { method:'POST', headers: authHeaders() })
    .then(r=>r.json())
    .then(d=>{
      btn.disabled = false; btn.innerHTML = old;
      if(!d.ok){ box.innerHTML = '<div style="color:#c0392b;font-size:12px;">'+esc(typeof d.error==='string'?d.error:'Gagal semak kadar')+'</div>'; return; }
      if(!d.rates || !d.rates.length){ box.innerHTML = '<div style="color:#9a8d80;font-size:12px;">Tiada kurier tersedia.</div>'; return; }
      box.innerHTML = '<div style="font-size:11px;color:#9a8d80;margin-bottom:6px;">Berat '+Number(d.weight||0).toFixed(1)+' kg · pilih kurier:</div>'
        + d.rates.map(r=>
          '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid #e8e0d8;border-radius:8px;padding:8px 10px;margin-bottom:6px;">'
          + '<div style="font-size:12.5px;"><b>'+esc(r.courier_name||r.service_name||'Kurier')+'</b>'+(r.delivery?'<div style="font-size:11px;color:#9a8d80;">'+esc(r.delivery)+'</div>':'')+'</div>'
          + '<div style="display:flex;align-items:center;gap:8px;"><b style="font-size:13px;color:#a86d69;">RM '+Number(r.price).toFixed(2)+'</b>'
          + '<button onclick="epBookEditor(\''+esc(ref)+'\', \''+esc(String(r.service_id))+'\', this)" style="padding:6px 12px;background:#2d2520;color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;">Book</button></div>'
          + '</div>'
        ).join('');
    })
    .catch(()=>{ btn.disabled = false; btn.innerHTML = old; box.innerHTML = '<div style="color:#c0392b;font-size:12px;">Ralat rangkaian</div>'; });
}
function epBookEditor(ref, serviceId, btnEl){
  if(!confirm('Book penghantaran dengan kurier ini? Kredit EasyParcel akan ditolak.')) return;
  if(btnEl){ btnEl.disabled = true; btnEl.textContent = '...'; }
  fetch('/api/orders/'+encodeURIComponent(ref)+'/ep-book', {
    method:'POST', headers:{'Content-Type':'application/json',...authHeaders()},
    body: JSON.stringify({ service_id: serviceId })
  })
    .then(r=>r.json())
    .then(d=>{
      const box = document.getElementById('ep-box-'+ref);
      if(!d.ok){ if(box) box.querySelector('.ep-rates').innerHTML = '<div style="color:#c0392b;font-size:12px;">'+esc(typeof d.error==='string'?d.error:'Gagal book')+'</div>'; return; }
      showToast('Penghantaran ditempah ✓');
      if(box) box.innerHTML = '<div style="font-size:10px;color:#9a8d80;font-weight:600;margin-bottom:6px;"><i class="ph ph-truck"></i> PENGHANTARAN (EASYPARCEL)</div>' + epBookedHtml(d);
    })
    .catch(()=>showToast('Ralat rangkaian'));
}

function updateStatus(ref, status){
  fetch('/api/orders/'+encodeURIComponent(ref), {
    method:'PUT', headers:{'Content-Type':'application/json',...authHeaders()},
    body:JSON.stringify({status})
  })
    .then(r=>r.json())
    .then(res=>{
      if(res.ok){ showToast(`Status #${ref} dikemaskini → ${status}`); loadMyOrders(); }
      else showToast(res.error==='forbidden' ? 'Order ini bukan milik anda.' : 'Gagal kemaskini status');
    })
    .catch(()=>showToast('Gagal sambung ke server'));
}

// Boot
if(sessionStorage.getItem('pixyo_token')){
  fetch('/api/me',{ headers:authHeaders() }).then(r=>r.json()).then(res=>{
    if(res.ok && res.role === 'editor'){ initPortal(); }
    else { sessionStorage.removeItem('pixyo_token'); showLogin(); }
  }).catch(()=>showLogin());
} else {
  showLogin();
}
</script>
